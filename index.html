<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube App</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    iframe, webview {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .message {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 20px;
      text-align: center;
      background: #000;
    }
  </style>
</head>
<body>
  <iframe id="youtubeFrame" src="https://example.com/" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var frame = document.getElementById('youtubeFrame');
      frame.addEventListener('error', function () {
        document.body.innerHTML = '<div class="message">Unable to load YouTube directly in the iframe. If your Tizen device supports native webviews, replace the iframe with a <code>&lt;webview&gt;</code> element or launch the browser.</div>';
      });
    });
  </script>
</body>
</html>
