<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube App</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      cursor: default;
    }
    iframe, webview {
      width: 100%;
      height: 100%;
      border: 0;
      pointer-events: all;
    }
    .message {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 20px;
      text-align: center;
      background: #000;
    }
  </style>
</head>
<body>
  <iframe id="youtubeFrame" src="https://example.com/" tabindex="-1" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
  <script>
    if (window.tizen && tizen.tvinputdevice) {
      tizen.tvinputdevice.registerKey('Back');
      tizen.tvinputdevice.registerKey('MousePointer');
    }

    // Capture phase (true) intercepts the key before the iframe sees it
    window.addEventListener('keydown', function (e) {
      if (e.keyCode === 10009) {
        e.preventDefault();
        e.stopPropagation();
        if (window.tizen) {
          tizen.application.getCurrentApplication().exit();
        }
      }
    }, true);

    // Keep focus on body so the iframe never steals keyboard events
    document.addEventListener('DOMContentLoaded', function () {
      document.body.focus();

      var frame = document.getElementById('youtubeFrame');
      frame.addEventListener('error', function () {
        document.body.innerHTML = '<div class="message">Unable to load the page in the iframe.</div>';
      });
    });
  </script>
</body>
</html>
